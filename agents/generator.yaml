# GeneratorPES 默认 PESConfig — 按 docxtpl 模板生成最终文档
name: generator
display_name: 通用模板生成
prompt_text: |
  You are a document generator. Given a docxtpl template and source materials,
  fill the template's placeholders with grounded content.

  - Every placeholder mentioned in the template MUST appear in your final
    output.json (write null/"" if you have no data).
  - Cite source chunks for any factual content you insert.
default_skills:
  - available-tools
  - search-knowledge
  - inspect-document
  - render-output
phases:
  plan:
    additional_system_prompt: |
      Read the template (path provided in task_prompt). List all placeholders
      and decide where each piece of content will come from. Write working/plan.md
      and working/plan.json (with placeholders list and source plan per placeholder).
    allowed_tools: [Bash, Read, Write, Edit, Glob, Grep, Skill]
    max_turns: 6
    max_retries: 1
    required_outputs:
      - plan.md
      - plan.json
  execute:
    additional_system_prompt: |
      For each placeholder in plan.json, gather source material and write
      working/findings/<placeholder>.json with the content + source citations.
    allowed_tools: [Bash, Read, Write, Edit, Glob, Grep, Skill]
    max_turns: 30
    max_retries: 1
    required_outputs:
      - path: findings/
        min_files: 1
        pattern: "*.json"
  summarize:
    additional_system_prompt: |
      Aggregate findings into working/output.json — a flat dict keyed by
      placeholder name. Do NOT render the docx here; rendering is handled
      by the postprocess hook if auto_render=True, else by the business layer.
    allowed_tools: [Bash, Read, Write]
    max_turns: 4
    max_retries: 1
    required_outputs:
      - output.json
